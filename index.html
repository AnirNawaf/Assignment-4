<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <title>4 th Assignment </title>

  </head>
  <body class="bg-gray-200 p-10 sm:p-7">

    <div class="max-w-5xl mx-auto">
      <h1 class="text-2xl text-center sm:text-4xl sm:text-start font-bold  mb-6 ">
        Job Application Tracker
      </h1>

      <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-4">
        <div class="bg-white rounded-xl p-4 shadow-2xl">
          <p class="text-2xl font-bold">Total</p>
          <p id="totalCount" class="text-3xl sm:text-4xl font-bold">0</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-4">
          <p class="text-2xl font-bold">Interview</p>
          <p id="intvCount" class="text-3xl sm:text-4xl font-bold text-green-600">0</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-4">
          <p class="text-2xl font-bold">Rejected</p>
          <p id="rejCount" class="text-3xl sm:text-4xl font-bold text-red-600">0</p>
        </div>
      </div>
    </div>

    <div class="space-y-4 max-w-5xl mx-auto pt-6 sm:pt-8 pb-8">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3 sm:gap-1">
        <h1 class="text-2xl sm:text-3xl font-bold">Available Jobs</h1>
        <p id="availableCount" class="text-lg font-semibold text-gray-600">0 Jobs</p>
      </div>

      <div class="flex flex-wrap gap-2 sm:gap-5 mb-6">
        <button id="all" onclick="showTab('all')" class="px-4 py-2 rounded bg-blue-500 text-white font-semibold">All</button>
        <button id="interview" onclick="showTab('Interview')" class="px-4 py-2 rounded bg-green-500 text-white font-semibold">Interview</button>
        <button id="rejected" onclick="showTab('Rejected')" class="px-4 py-2 rounded bg-red-500 text-white font-semibold">Rejected</button>
      </div>
    </div>

    <div id="card" class="space-y-4 max-w-5xl mx-auto"></div>

    <script>
      let currentTab = "all";
      let jobs = [
        {
            id:1, company:"TechNova", position:"Frontend Developer", Renote:"New York, NY • Full-time • $90,000 - $110,000", status:"Not Applied", description:"Build and maintain modern web interfaces using React and Tailwind CSS."
        },

        {
            id:2, company:"InnoSoft", position:"Backend Developer", Renote:"Austin, TX • Remote • $95,000 - $120,000", status:"Not Applied", description:"Develop secure and scalable APIs using Node.js and Express."
        },

        {
            id:3, company:"SkyTech", position:"UI/UX Designer", Renote:"San Francisco, CA • Full-time • $85,000 - $105,000", status:"Not Applied", description:"Design user-friendly interfaces and improve user experience."
        },

        {
            id:4, company:"CloudNet", position:"DevOps Engineer", Renote:"Chicago, IL • Hybrid • $100,000 - $130,000", status:"Not Applied", description:"Manage CI/CD pipelines and cloud infrastructure."
        },

        {
            id:5, company:"BrightCode", position:"Software Engineer", Renote:"Boston, MA • Full-time • $98,000 - $125,000", status:"Not Applied", description:"Develop and maintain enterprise-level applications."
        },

        {
            id:6, company:"DataWorks", position:"Data Analyst", Renote:"Denver, CO • Remote • $75,000 - $95,000", status:"Not Applied", description:"Analyze datasets and generate business insights"
        },


        {
            id:7, company:"CyberLink", position:"Cyber Security Specialist", Renote:"Los Angeles, CA • Full-time • $105,000 - $140,000", status:"Not Applied", description:"Monitor and secure company networks and systems."
        },


        {
            id:8, company:"Appify", position:"Mobile App Developer", Renote:"Miami, FL • Hybrid • $88,000 - $115,000", status:"Not Applied", description:"Develop cross-platform mobile apps using Flutter."
        },

      ];

      function showTab(tab){
        currentTab = tab;
        display();
      }

      function count(){
        const total = jobs.length;
        const interview = jobs.filter(job => job.status === "Interview").length;
        const rejected = jobs.filter(job => job.status === "Rejected").length;
        document.getElementById("intvCount").innerText = interview;
        document.getElementById("rejCount").innerText = rejected;
        document.getElementById("totalCount").innerText = total;
      }
       function deleteJob(id){
        jobs = jobs.filter(job => job.id !== id);
        display();
        count();
      }

      function interview(id){
        jobs.find(job => job.id === id).status = "Interview";
        display();
        count();
      }
      function rejected(id){
        jobs.find(job => job.id === id).status = "Rejected";
        display();
        count();
      }

    </script>
  </body>
</html>
